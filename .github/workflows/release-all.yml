name: release-all
run-name: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.mode || 'build-and-publish') || 'build-and-publish' }} ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }} @ ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || 'main') || github.sha }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode: build+publish, prebuild only, or publish existing artifacts"
        required: false
        default: build-and-publish
        type: choice
        options:
          - build-and-publish
          - build-artifacts
          - publish-artifacts
      tag:
        description: "Release tag (e.g. v0.1.12)"
        required: true
        type: string
      ref:
        description: "Git ref/branch/sha to build"
        required: false
        default: "main"
        type: string
      prerelease:
        description: "Release channel override (auto/true/false)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - true
          - false
      artifacts_run_id:
        description: "Existing artifact workflow run id; required for publish-artifacts"
        required: false
        default: ""
        type: string
      publish_containers:
        description: "Push Docker images to GHCR"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  packages: write

env:
  TAURI_CLI_VERSION: 2.10.1
  CARGO_TARGET_DIR: ${{ github.workspace }}/target-shared
  RELEASE_MODE: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.mode || 'build-and-publish') || 'build-and-publish' }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || 'main') || github.sha }}
  RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.prerelease || 'auto') || 'auto' }}
  RELEASE_ARTIFACTS_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.artifacts_run_id || '' }}
  RELEASE_PUBLISH_CONTAINERS: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.publish_containers || 'true') || 'true' }}

concurrency:
  group: ${{ format('{0}-tag-{1}', github.workflow, github.event_name == 'workflow_dispatch' && (startsWith(github.event.inputs.tag, 'v') && github.event.inputs.tag || format('v{0}', github.event.inputs.tag)) || github.ref_name) }}
  cancel-in-progress: false

jobs:
  build_frontend_dist:
    if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.mode || 'build-and-publish') != 'publish-artifacts' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup release environment
        uses: ./.github/actions/setup-release-env
        with:
          enable-rust: "false"

      - name: Install frontend dependencies
        working-directory: apps
        run: pnpm install --frozen-lockfile

      - name: Build frontend dist
        working-directory: apps
        run: pnpm run build:desktop

      - name: Pack frontend dist artifact
        shell: bash
        run: bash scripts/release/pack-frontend-dist.sh apps frontend-dist.tar.gz

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: codexmanager-frontend-dist
          path: frontend-dist.tar.gz
          if-no-files-found: error
          compression-level: 0

  build_windows:
    needs: build_frontend_dist
    if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.mode || 'build-and-publish') != 'publish-artifacts' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup release environment
        uses: ./.github/actions/setup-release-env
        with:
          enable-pnpm-cache: "false"

      - name: Prepare frontend dist
        uses: ./.github/actions/prepare-frontend-dist

      - name: Build Tauri bundle (with retry)
        uses: ./.github/actions/build-tauri-with-retry
        with:
          working-directory: apps
          tauri-cli-version: ${{ env.TAURI_CLI_VERSION }}
          bundles: nsis
          shell-type: pwsh

      - name: Stage desktop release assets
        shell: pwsh
        run: ./scripts/release/stage-windows-desktop-assets.ps1 -ReleaseDir "${{ env.CARGO_TARGET_DIR }}/release" -RunnerArch "${{ runner.arch }}"

      - name: Build service binaries
        shell: pwsh
        run: ./scripts/release/build-service-binaries.ps1

      - name: Stage service package
        uses: ./.github/actions/stage-service-package
        with:
          platform: windows
          arch: ${{ runner.arch == 'X64' && 'x86_64' || runner.arch == 'ARM64' && 'arm64' || runner.arch }}
          stage-root: stage
          release-dir: ${{ env.CARGO_TARGET_DIR }}/release
          binary-extension: .exe
          shell-type: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: codexmanager-windows
          path: ${{ env.CARGO_TARGET_DIR }}/release/release-assets/*.exe
          if-no-files-found: error
          compression-level: 0

      - name: Upload service artifacts
        uses: actions/upload-artifact@v6
        with:
          name: codexmanager-service-windows
          path: stage/*.zip
          if-no-files-found: error
          compression-level: 0

  build_macos_beta:
    needs: build_frontend_dist
    if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.mode || 'build-and-publish') != 'publish-artifacts' }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            rust_target: aarch64-apple-darwin
          - arch: x64
            rust_target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup release environment
        uses: ./.github/actions/setup-release-env
        with:
          rust-target: ${{ matrix.rust_target }}
          enable-pnpm-cache: "false"

      - name: Prepare frontend dist
        uses: ./.github/actions/prepare-frontend-dist

      - name: Build macOS app bundle
        uses: ./.github/actions/build-tauri-with-retry
        with:
          working-directory: apps
          tauri-cli-version: ${{ env.TAURI_CLI_VERSION }}
          bundles: app
          target: ${{ matrix.rust_target }}
          shell-type: bash

      - name: Rebuild macOS dmg with first-launch helper
        shell: bash
        run: bash scripts/release/rebuild-macos-dmg.sh "${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release" "${{ matrix.arch }}"

      - name: Stage legacy macOS portable package
        if: ${{ matrix.arch == 'x64' }}
        shell: bash
        run: bash scripts/release/stage-macos-portable.sh "${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release"

      - name: Build service binaries
        run: bash scripts/release/build-service-binaries.sh "${{ matrix.rust_target }}"

      - name: Stage service package
        uses: ./.github/actions/stage-service-package
        with:
          platform: macos
          arch: ${{ matrix.arch }}
          stage-root: stage
          release-dir: ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release
          shell-type: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: codexmanager-macos-${{ matrix.arch }}
          path: |
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release/portable/*.zip
          if-no-files-found: error
          compression-level: 0

      - name: Upload service artifacts
        uses: actions/upload-artifact@v6
        with:
          name: codexmanager-service-macos-${{ matrix.arch }}
          path: stage/*.zip
          if-no-files-found: error
          compression-level: 0

  build_linux:
    needs: build_frontend_dist
    if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.mode || 'build-and-publish') != 'publish-artifacts' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            rust_target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            build_docker: true
          - arch: arm64
            rust_target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            build_docker: false
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup release environment
        uses: ./.github/actions/setup-release-env
        with:
          rust-target: ${{ matrix.rust_target }}
          enable-pnpm-cache: "false"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev zip

      - name: Prepare frontend dist
        uses: ./.github/actions/prepare-frontend-dist

      - name: Build Tauri bundle (with retry)
        uses: ./.github/actions/build-tauri-with-retry
        with:
          working-directory: apps
          tauri-cli-version: ${{ env.TAURI_CLI_VERSION }}
          bundles: appimage,deb
          target: ${{ matrix.rust_target }}
          shell-type: bash

      - name: Stage portable package
        shell: bash
        run: bash scripts/release/stage-linux-portable.sh "${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release" "${{ matrix.arch }}"

      - name: Build service binaries
        run: bash scripts/release/build-service-binaries.sh "${{ matrix.rust_target }}"

      - name: Stage docker release package
        if: ${{ matrix.build_docker }}
        shell: bash
        run: bash scripts/release/stage-linux-docker.sh "${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release"

      - name: Upload docker artifacts
        if: ${{ matrix.build_docker }}
        uses: actions/upload-artifact@v6
        with:
          name: codexmanager-docker
          path: |
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release/release-assets/codexmanager-docker-images.tar.gz
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release/release-assets/docker-compose.release.yml
          if-no-files-found: error
          compression-level: 0

      - name: Stage service package
        uses: ./.github/actions/stage-service-package
        with:
          platform: linux
          arch: ${{ matrix.arch }}
          stage-root: stage
          release-dir: ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release
          shell-type: bash

      - name: Stage web package
        shell: bash
        run: bash scripts/release/stage-linux-web.sh "${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release" "${{ matrix.arch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: codexmanager-linux-${{ matrix.arch }}
          path: |
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release/bundle/**/*.AppImage
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release/bundle/**/*.deb
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release/portable/*.zip
          if-no-files-found: error
          compression-level: 0

      - name: Upload service artifacts
        uses: actions/upload-artifact@v6
        with:
          name: codexmanager-service-linux-${{ matrix.arch }}
          path: stage/*.zip
          if-no-files-found: error
          compression-level: 0

      - name: Upload web artifacts
        uses: actions/upload-artifact@v6
        with:
          name: codexmanager-web-linux-${{ matrix.arch }}
          path: ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release/release-assets/CodexManager-web-linux-${{ matrix.arch }}.zip
          if-no-files-found: error
          compression-level: 0

  release:
    needs: [build_windows, build_macos_beta, build_linux]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || (github.event.inputs.mode || 'build-and-publish') != 'build-artifacts') && ((github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'publish-artifacts') || (needs.build_windows.result == 'success' && needs.build_macos_beta.result == 'success' && needs.build_linux.result == 'success')) }}
    runs-on: ubuntu-22.04

    steps:
      - name: Validate publish-artifacts inputs
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'publish-artifacts' && github.event.inputs.artifacts_run_id == '' }}
        shell: bash
        run: |
          echo "artifacts_run_id is required when mode=publish-artifacts"
          exit 1

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Download current run artifacts
        if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.mode || 'build-and-publish') != 'publish-artifacts' }}
        uses: actions/download-artifact@v8
        with:
          pattern: codexmanager-*
          merge-multiple: true
          path: release-assets

      - name: Download existing run artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'publish-artifacts' }}
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ env.RELEASE_ARTIFACTS_RUN_ID }}
          github-token: ${{ github.token }}
          pattern: codexmanager-*
          merge-multiple: true
          path: release-assets

      - name: Login to GitHub Container Registry
        if: ${{ env.RELEASE_PUBLISH_CONTAINERS != 'false' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish docker images to GHCR
        if: ${{ env.RELEASE_PUBLISH_CONTAINERS != 'false' }}
        shell: bash
        run: bash scripts/release/publish-ghcr-images.sh release-assets "${{ github.repository_owner }}" "${{ env.RELEASE_TAG }}"

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Publish GitHub Release
        uses: ./.github/actions/publish-github-release
        with:
          tag: ${{ env.RELEASE_TAG }}
          ref: ${{ env.RELEASE_REF }}
          prerelease-input: ${{ env.RELEASE_PRERELEASE }}
          assets-dir: release-assets
